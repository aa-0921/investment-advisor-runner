name: Signal Check & Notify

on:
  schedule:
    # 6時間間隔（毎日）— JST 7:22, 13:22, 19:22, 1:22
    # 暗号資産は24/7のため土日も実行
    - cron: '22 4,10,16,22 * * *'
  workflow_dispatch:  # 手動トリガー

jobs:
  check-signals:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Clone private repository
        run: |
          git clone https://x-access-token:${{ secrets.PRIVATE_REPO_PAT }}@github.com/aa-0921/investment-advisor.git

      - name: Setup uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        working-directory: investment-advisor
        run: uv sync --no-dev

      - name: Create .env
        working-directory: investment-advisor
        run: |
          echo "NOTIFY_EMAIL_PASSWORD=${{ secrets.NOTIFY_EMAIL_PASSWORD }}" > .env

      - name: Run signal check
        working-directory: investment-advisor
        run: uv run python scripts/notify_check.py

      - name: Persist signal history
        working-directory: investment-advisor
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f data/signal_history.json data/.last_notified
          git diff --cached --quiet || git commit -m "chore: update signal history [skip ci]"
          git pull --rebase || true
          git push
